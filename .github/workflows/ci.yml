name: ci

on:
  push:
    branches: [main, 'feat/**', 'fix/**']
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: bash scripts/check-no-secrets.sh
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test
      - run: bash scripts/smoke-gate.sh
      - run: bash scripts/smoke-execute-partition.sh
      - run: bash scripts/smoke-ollama.sh
      - run: bash scripts/pty-smoke.sh

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build --release
      - run: cp target/release/coxn coxn-${{ runner.os }}-${{ runner.arch }}
      - uses: softprops/action-gh-release@v2
        with:
          files: coxn-${{ runner.os }}-${{ runner.arch }}